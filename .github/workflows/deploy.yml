name: Atomic deploy (rsync)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf "%s" "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Atomic deploy
        run: |
          APP_DIR="/home/${{ secrets.VPS_USER }}/site/alzheimer"
          TIMESTAMP=$(date +"%Y%m%d_%H%M%S")
          RELEASE_DIR="$APP_DIR/releases/$TIMESTAMP"

          ssh -i ~/.ssh/id_rsa ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "mkdir -p $RELEASE_DIR"
          
          # copy to VPS
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_rsa" \
            dist/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:$RELEASE_DIR/

          ssh -i ~/.ssh/id_rsa ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << EOF
            set -e

            # switch release
            ln -sfn $RELEASE_DIR $APP_DIR/current

            echo "Deployment switched to $RELEASE_DIR"

            # cleanup: keep last 5 releases
            cd $APP_DIR/releases
            ls -1dt */ | tail -n +6 | xargs rm -rf || true
          EOF
